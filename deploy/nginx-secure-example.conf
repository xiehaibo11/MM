# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    root /var/www/lingjie;
    index index.html;

    # TLS certs
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Allow file uploads up to 10MB (icons, UI images, etc.)
    client_max_body_size 10m;

    # === ANTI-FINGERPRINT: Hide all server identity ===
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$host; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Hide PHP version from all fastcgi responses
    fastcgi_hide_header X-Powered-By;

    # NOTE: Put these in nginx.conf http{} block:
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # limit_conn_zone $binary_remote_addr zone=addr:10m;

    # === CUSTOM ERROR PAGES: Generic, no server info ===
    error_page 400 401 403 404 405 500 502 503 504 /error.html;
    location = /error.html {
        internal;
        return 200 '<!DOCTYPE html><html><head><title>Error</title></head><body><p>Request could not be processed.</p></body></html>';
        add_header Content-Type text/html;
    }

    # === BLOCK SCANNERS: Common probe paths ===
    location ~* ^/(wp-admin|wp-login|wp-content|wordpress|phpmyadmin|adminer|\.git|\.svn|\.well-known/security\.txt) {
        return 444;
    }

    # === ALLOW specific private PHP endpoints called by frontend ===
    location ~ ^/private/(profile_api|build_api|inventory_api)\.php$ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 20;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # === SERVE USER UPLOADED FILES (icons, UI images only) ===
    location ~ ^/user/storage/\d+/icons/[a-f0-9]{32}\.png$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~ ^/user/ui/[a-f0-9]{32}\.png$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~ ^/user/storage/\d+/wall/ {
        expires 1d;
        try_files $uri =404;
    }

    # Block all other user/ paths
    location ~* ^/user/ {
        deny all;
        return 404;
    }

    # === BLOCK SENSITIVE DIRECTORIES ===
    location ~* ^/(private|configs|vendor|logs|scripts|deploy|store|node_modules)/ {
        deny all;
        return 404;
    }

    # === BLOCK DOTFILES (except .well-known) ===
    location ~ /\. {
        deny all;
        return 404;
    }

    # === BLOCK SENSITIVE FILES ===
    location ~* \.(env|example|ini|log|sql|bak|old|sh|ps1|json|md|txt|yml|yaml|xml|config|exe|zip|pem|key|crt)$ {
        deny all;
        return 404;
    }

    # === BLOCK ling.sql directly ===
    location = /ling.sql {
        return 404;
    }

    # === BLOCK direct PHP access in api/ws/ ===
    location ~* ^/api/ws/.*\.(php|js|txt|json|log)$ {
        deny all;
        return 404;
    }

    # === API endpoints (only allow specific PHP files) ===
    location ~ ^/api/(auth|devices|detail|assign|remove|toggle|sync|report|Ping|Error)\.php$ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 20;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Block all other PHP files in api/
    location ~ ^/api/.*\.php$ {
        return 404;
    }

    # === FRONTEND SPA ===
    location / {
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn addr 30;
        try_files $uri $uri/ /index.html;
    }

    # === PHP handler (only root-level, no directory traversal) ===
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # === WebSocket reverse proxy ===
    location /api/ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://127.0.0.1:8080/;
    }

    # Favicon: return empty if missing (avoid default 404 page)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }

    # === Disallow everything else ===
    autoindex off;

    # Block user-agent scanners
    if ($http_user_agent ~* (nmap|nikto|sqlmap|dirbuster|gobuster|masscan|zgrab|censys|shodan)) {
        return 444;
    }

    # === DEPLOYMENT NOTES ===
    # Add to php.ini: expose_php = Off
    # This prevents the X-Powered-By: PHP/x.x.x header from being sent
}
