; PHP production security overrides for Ubuntu
; Suggested path: /etc/php/8.2/fpm/conf.d/99-lingjie-security.ini

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On

; Session hardening
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict

; Reduce SSRF/file abuse surface
allow_url_fopen = Off
mysql.allow_local_infile = Off

; Hardening (uncomment after verifying compatibility)
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen
; open_basedir = /var/www/lingjie:/tmp
